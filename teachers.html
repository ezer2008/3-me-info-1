function load(month){

if(data[month].length === 0){
document.getElementById("body").innerHTML =
`<tr><td colspan="3">🚫 لا توجد معلومات لهذا الشهر</td></tr>`;
return;
}

let html = "";

data[month].forEach((t,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>
<button onclick="toggle(${i})">إظهار</button>
<div class="details" id="d${i}">
التقييم: ${t.score}/10 <br>
ملاحظات: ${t.note}
</div>
</td>
</tr>
`;
});

document.getElementById("body").innerHTML = html;
}

function toggle(i){
let d = document.getElementById("d"+i);
d.style.display = d.style.display === "block" ? "none" : "block";
}

function changeMonth(month){
load(month);
}
